<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backup Übersicht</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="hero hero-backups">
      <div>
        <p class="kicker">Filen Backup Add-on</p>
        <h1>Backup Übersicht</h1>
        <p>Zeigt verfügbare Backups aus dem konfigurierten Storage an.</p>
      </div>
      <nav class="tabs">
        <a class="tab" href="/setup.html">Setup</a>
        <a class="tab active" href="/backups.html">Backups</a>
      </nav>
    </header>

    <main class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2>Backups</h2>
          <button id="reload" class="btn ghost">Neu laden</button>
        </div>
        <div id="meta" class="meta"></div>
        <div id="backup-list" class="list"></div>
      </section>

      <section class="panel">
        <h2>Hinweis</h2>
        <p class="hint">
          Die Übersicht listet aktuell lokale Backups direkt. Für Filen werden Upload/Restore unterstützt;
          ein Remote-Listing ist als nächster Schritt geplant.
        </p>
      </section>
    </main>

    <script src="/backups.js"></script>
  </body>
</html>
