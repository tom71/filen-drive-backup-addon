name: Filen Drive Backup
version: 0.1.19
slug: filen_drive_backup
description: Erstellt verschluesselte Backups und legt sie ueber einen Storage-Provider ab.
url: https://github.com/tom71/filen-drive-backup-addon
documentation: https://github.com/tom71/filen-drive-backup-addon/blob/main/README.md
issue_tracker: https://github.com/tom71/filen-drive-backup-addon/issues
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_entry: /
ingress_port: 8099
hassio_api: true
homeassistant_api: true
hassio_role: backup
panel_admin: true
panel_title: Filen Drive Backup
panel_icon: mdi:cloud-upload-outline
ports:
  8099/tcp: null
map:
  - backup:rw
  - share:rw
  - addon_config:rw
  - ssl
options:
  source_directory: /backup
  working_directory: /tmp/hassio-filen-backup
  restore_directory: /restore
  encryption_passphrase: change-me
  storage_provider: filen
  max_backups_in_filen_drive: 5
  days_between_backups: 3
  backup_time_of_day: "13:30"
  delete_after_upload: true
  backup_name: "{type} Backup HA {version_ha}"
  generational_days: 3
  generational_weeks: 4
  send_error_reports: true
  exclude_folders: "homeassistant,ssl,share,addons/local,media"
  exclude_addons: "core_configurator"
  filen_api_key: ""
  filen_email: ""
  filen_password: ""
  filen_2fa_code: "XXXXXX"
  filen_base_url: ""
  filen_target_folder: /Home Assistant Backups
  filen_auth_state_path: /addon_configs/filen_drive_backup/filen-auth-state.json
schema:
  source_directory: str
  working_directory: str
  restore_directory: str?
  encryption_passphrase: password
  storage_provider: list(filen)
  max_backups_in_filen_drive: int(1,)?
  days_between_backups: int(1,)?
  backup_time_of_day: match(^([01][0-9]|2[0-3]):[0-5][0-9]$)?
  delete_after_upload: bool?
  backup_name: str?
  generational_days: int(0,)?
  generational_weeks: int(0,)?
  send_error_reports: bool?
  exclude_folders: str?
  exclude_addons: str?
  filen_api_key: str?
  filen_email: str?
  filen_password: password?
  filen_2fa_code: str?
  filen_base_url: str?
  filen_target_folder: str?
  filen_auth_state_path: str?
